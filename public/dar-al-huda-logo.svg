<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <!-- Deep emerald to rich forest green gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d4a2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a7a4a;stop-opacity:1" />
    </linearGradient>
    <!-- Gold shimmer gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8b931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8940a;stop-opacity:1" />
    </linearGradient>
    <!-- Soft glow for emblem -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#00000044"/>
    </filter>
  </defs>

  <!-- Rounded background pill -->
  <rect x="2" y="2" width="316" height="96" rx="14" ry="14" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Decorative border inset -->
  <rect x="5" y="5" width="310" height="90" rx="11" ry="11" fill="none" stroke="url(#goldGrad)" stroke-width="0.7" opacity="0.5"/>

  <!-- ═══ EMBLEM: Crescent + Star + Open Book (left side) ═══ -->
  <!-- Open book -->
  <g transform="translate(18, 17)" filter="url(#glow)">
    <!-- Left page -->
    <path d="M16,7 C12,6 7,6 3,7 L3,52 C7,51 12,51 16,52 Z" fill="#e8b931" opacity="0.9"/>
    <!-- Right page -->
    <path d="M16,7 C20,6 25,6 29,7 L29,52 C25,51 20,51 16,52 Z" fill="#f5d080" opacity="0.9"/>
    <!-- Spine -->
    <rect x="14.5" y="6" width="3" height="47" rx="1" fill="#c8940a"/>
    <!-- Lines on left page -->
    <line x1="6" y1="16" x2="14" y2="16" stroke="#0d4a2f" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="21" x2="14" y2="21" stroke="#0d4a2f" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="26" x2="14" y2="26" stroke="#0d4a2f" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="31" x2="14" y2="31" stroke="#0d4a2f" stroke-width="1.2" opacity="0.6"/>
    <!-- Lines on right page -->
    <line x1="18" y1="16" x2="26" y2="16" stroke="#0d4a2f" stroke-width="1.2" opacity="0.6"/>
    <line x1="18" y1="21" x2="26" y2="21" stroke="#0d4a2f" stroke-width="1.2" opacity="0.6"/>
    <line x1="18" y1="26" x2="26" y2="26" stroke="#0d4a2f" stroke-width="1.2" opacity="0.6"/>
    <line x1="18" y1="31" x2="26" y2="31" stroke="#0d4a2f" stroke-width="1.2" opacity="0.6"/>
    <!-- Crescent above book -->
    <path d="M16,0 A8,8 0 0,1 16,0 A5,5 0 0,0 16,0" fill="none"/>
    <!-- Crescent moon -->
    <path d="M10,3 A7,7 0 1,0 22,3 A5,5 0 1,1 10,3 Z" fill="url(#goldGrad)" transform="translate(0,-4)"/>
    <!-- Star next to crescent -->
    <polygon points="24,-1 25.2,2.6 29,2.6 26.1,4.9 27.2,8.5 24,6.2 20.8,8.5 21.9,4.9 19,2.6 22.8,2.6" fill="url(#goldGrad)" transform="translate(-5,-4) scale(0.6)"/>
  </g>

  <!-- Vertical divider -->
  <line x1="62" y1="14" x2="62" y2="86" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.5"/>

  <!-- ═══ TEXT BLOCK (right of emblem) ═══ -->

  <!-- Arabic: دار الهدى -->
  <text
    x="174"
    y="40"
    font-family="'Scheherazade New', 'Traditional Arabic', 'Amiri', 'Arial Unicode MS', serif"
    font-size="24"
    font-weight="700"
    fill="url(#goldGrad)"
    text-anchor="middle"
    letter-spacing="1"
  >دار الهُدى</text>

  <!-- English: DAR AL HUDA -->
  <text
    x="174"
    y="60"
    font-family="'Cinzel', 'Trajan Pro', 'Times New Roman', serif"
    font-size="16"
    font-weight="700"
    fill="#f5d080"
    text-anchor="middle"
    letter-spacing="3.5"
  >DAR AL HUDA</text>

  <!-- Thin gold ornamental divider -->
  <g transform="translate(174, 68)" text-anchor="middle">
    <line x1="-60" y1="0" x2="-10" y2="0" stroke="url(#goldGrad)" stroke-width="0.7" opacity="0.6"/>
    <circle cx="0" cy="0" r="2" fill="url(#goldGrad)" opacity="0.8"/>
    <line x1="10" y1="0" x2="60" y2="0" stroke="url(#goldGrad)" stroke-width="0.7" opacity="0.6"/>
  </g>

  <!-- Tagline -->
  <text
    x="174"
    y="83"
    font-family="'Georgia', 'Palatino', serif"
    font-size="8.5"
    font-weight="400"
    fill="#a8d8b8"
    text-anchor="middle"
    letter-spacing="2"
    font-style="italic"
  >ONLINE QURAN LEARNING ACADEMY</text>
</svg>
