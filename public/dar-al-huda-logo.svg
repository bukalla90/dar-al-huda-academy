<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="640" height="200">
  <defs>
    <!-- Deep emerald to rich forest green gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d4a2f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a7a4a;stop-opacity:1" />
    </linearGradient>
    <!-- Gold shimmer gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d080;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e8b931;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c8940a;stop-opacity:1" />
    </linearGradient>
    <!-- Soft glow for emblem -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000044"/>
    </filter>
  </defs>

  <!-- Rounded background pill -->
  <rect x="8" y="8" width="1264" height="384" rx="56" ry="56" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Decorative border inset -->
  <rect x="20" y="20" width="1240" height="360" rx="44" ry="44" fill="none" stroke="url(#goldGrad)" stroke-width="2.8" opacity="0.5"/>

  <!-- ═══ EMBLEM: Crescent + Star + Open Book (left side) ═══ -->
  <g transform="translate(72, 68)" filter="url(#glow)">
    <!-- Left page -->
    <path d="M64,28 C48,24 28,24 12,28 L12,208 C28,204 48,204 64,208 Z" fill="#e8b931" opacity="0.9"/>
    <!-- Right page -->
    <path d="M64,28 C80,24 100,24 116,28 L116,208 C100,204 80,204 64,208 Z" fill="#f5d080" opacity="0.9"/>
    <!-- Spine -->
    <rect x="58" y="24" width="12" height="188" rx="4" fill="#c8940a"/>
    <!-- Lines on left page -->
    <line x1="24" y1="64" x2="56" y2="64" stroke="#0d4a2f" stroke-width="4.8" opacity="0.6"/>
    <line x1="24" y1="84" x2="56" y2="84" stroke="#0d4a2f" stroke-width="4.8" opacity="0.6"/>
    <line x1="24" y1="104" x2="56" y2="104" stroke="#0d4a2f" stroke-width="4.8" opacity="0.6"/>
    <line x1="24" y1="124" x2="56" y2="124" stroke="#0d4a2f" stroke-width="4.8" opacity="0.6"/>
    <!-- Lines on right page -->
    <line x1="72" y1="64" x2="104" y2="64" stroke="#0d4a2f" stroke-width="4.8" opacity="0.6"/>
    <line x1="72" y1="84" x2="104" y2="84" stroke="#0d4a2f" stroke-width="4.8" opacity="0.6"/>
    <line x1="72" y1="104" x2="104" y2="104" stroke="#0d4a2f" stroke-width="4.8" opacity="0.6"/>
    <line x1="72" y1="124" x2="104" y2="124" stroke="#0d4a2f" stroke-width="4.8" opacity="0.6"/>
    <!-- Crescent moon -->
    <path d="M40,12 A28,28 0 1,0 88,12 A20,20 0 1,1 40,12 Z" fill="url(#goldGrad)" transform="translate(0,-16)"/>
    <!-- Star next to crescent -->
    <polygon points="96,-4 100.8,10.4 116,10.4 104.4,19.6 108.8,34 96,24.8 83.2,34 87.6,19.6 76,10.4 91.2,10.4" fill="url(#goldGrad)" transform="translate(-20,-16) scale(0.6)"/>
  </g>

  <!-- Vertical divider -->
  <line x1="248" y1="56" x2="248" y2="344" stroke="url(#goldGrad)" stroke-width="3.2" opacity="0.5"/>

  <!-- ═══ TEXT BLOCK (right of emblem) ═══ -->

  <!-- Arabic: دار الهدى -->
  <text
    x="696"
    y="160"
    font-family="'Scheherazade New', 'Traditional Arabic', 'Amiri', 'Arial Unicode MS', serif"
    font-size="96"
    font-weight="700"
    fill="url(#goldGrad)"
    text-anchor="middle"
    letter-spacing="4"
  >دار الهُدى</text>

  <!-- English: DAR AL HUDA -->
  <text
    x="696"
    y="240"
    font-family="'Cinzel', 'Trajan Pro', 'Times New Roman', serif"
    font-size="64"
    font-weight="700"
    fill="#f5d080"
    text-anchor="middle"
    letter-spacing="14"
  >DAR AL HUDA</text>

  <!-- Thin gold ornamental divider -->
  <g transform="translate(696, 272)" text-anchor="middle">
    <line x1="-240" y1="0" x2="-40" y2="0" stroke="url(#goldGrad)" stroke-width="2.8" opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="url(#goldGrad)" opacity="0.8"/>
    <line x1="40" y1="0" x2="240" y2="0" stroke="url(#goldGrad)" stroke-width="2.8" opacity="0.6"/>
  </g>

  <!-- Tagline -->
  <text
    x="696"
    y="332"
    font-family="'Georgia', 'Palatino', serif"
    font-size="34"
    font-weight="400"
    fill="#a8d8b8"
    text-anchor="middle"
    letter-spacing="8"
    font-style="italic"
  >ONLINE QURAN LEARNING ACADEMY</text>
</svg>
