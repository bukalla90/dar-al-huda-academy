<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d4a2f"/>
      <stop offset="100%" style="stop-color:#1a7a4a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d080"/>
      <stop offset="50%" style="stop-color:#e8b931"/>
      <stop offset="100%" style="stop-color:#c8940a"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect x="1" y="1" width="30" height="30" rx="5" ry="5" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.6"/>

  <!-- Open Book -->
  <!-- Left page -->
  <path d="M7,10 C5,9.5 3,9.5 2,10 L2,24 C3,23.5 5,23.5 7,24 Z" fill="#e8b931" opacity="0.9"/>
  <!-- Right page -->
  <path d="M7,10 C9,9.5 11,9.5 12,10 L12,24 C11,23.5 9,23.5 7,24 Z" fill="#f5d080" opacity="0.9"/>
  <!-- Spine -->
  <rect x="6.2" y="9.5" width="1.6" height="15" rx="0.5" fill="#c8940a"/>

  <!-- Crescent + star top right -->
  <!-- Crescent -->
  <path d="M19,5 A5,5 0 1,0 27,5 A3.5,3.5 0 1,1 19,5 Z" fill="url(#gold)"/>
  <!-- Star -->
  <polygon points="28.5,4 29.1,5.8 31,5.8 29.5,6.9 30.1,8.7 28.5,7.6 26.9,8.7 27.5,6.9 26,5.8 27.9,5.8" fill="url(#gold)" transform="scale(0.7) translate(11,2)"/>

  <!-- Arabic letter ه (Ha / huda initial) centered bottom -->
  <text
    x="21"
    y="27"
    font-family="'Scheherazade New','Traditional Arabic','Arial Unicode MS',serif"
    font-size="11"
    font-weight="700"
    fill="url(#gold)"
    text-anchor="middle"
  >هُ</text>

  <!-- Lines on book pages -->
  <line x1="3" y1="14" x2="6" y2="14" stroke="#0d4a2f" stroke-width="0.8" opacity="0.7"/>
  <line x1="3" y1="17" x2="6" y2="17" stroke="#0d4a2f" stroke-width="0.8" opacity="0.7"/>
  <line x1="3" y1="20" x2="6" y2="20" stroke="#0d4a2f" stroke-width="0.8" opacity="0.7"/>
  <line x1="8" y1="14" x2="11" y2="14" stroke="#0d4a2f" stroke-width="0.8" opacity="0.7"/>
  <line x1="8" y1="17" x2="11" y2="17" stroke="#0d4a2f" stroke-width="0.8" opacity="0.7"/>
  <line x1="8" y1="20" x2="11" y2="20" stroke="#0d4a2f" stroke-width="0.8" opacity="0.7"/>
</svg>
